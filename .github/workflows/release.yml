name: Build & Release

on:
  push:
    tags:
      - 'v*'          # 推送 v1.0.0 这样的 tag 时触发
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: rjwt
            asset_name: rjwt-linux-x86_64

          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            binary: rjwt
            asset_name: rjwt-linux-aarch64

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: rjwt.exe
            asset_name: rjwt-windows-x86_64.exe

          - os: macos-latest
            target: x86_64-apple-darwin
            binary: rjwt
            asset_name: rjwt-macos-x86_64

          - os: macos-latest
            target: aarch64-apple-darwin
            binary: rjwt
            asset_name: rjwt-macos-aarch64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (aarch64 Linux)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Configure cross-compilation linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          mkdir -p .cargo
          cat >> .cargo/config.toml << 'EOF'
          [target.aarch64-unknown-linux-gnu]
          linker = "aarch64-linux-gnu-gcc"
          EOF

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        shell: bash
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} ${{ matrix.asset_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release & Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "rjwt ${{ github.ref_name }}"
          body: |
            ## rjwt ${{ github.ref_name }}

            JWT 安全分析工具，支持以下平台：

            | 文件 | 平台 |
            |------|------|
            | `rjwt-linux-x86_64` | Linux x86_64 |
            | `rjwt-linux-aarch64` | Linux ARM64 |
            | `rjwt-windows-x86_64.exe` | Windows x86_64 |
            | `rjwt-macos-x86_64` | macOS Intel |
            | `rjwt-macos-aarch64` | macOS Apple Silicon |

            > ⚠️ 仅用于授权渗透测试、CTF 及安全研究
          files: artifacts/*
          draft: false
          prerelease: false